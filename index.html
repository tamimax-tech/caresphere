<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CareSphere — Care That Evolves With You</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0F2444;--teal:#0E8A82;--teal-light:#12A99F;--dark:#071829;--off-white:#F4F7FA;--mid-grey:#8A9BB0;--light-border:#E0EAF4}
body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--navy);overflow-x:hidden}
h1,h2,h3{font-family:'DM Serif Display',serif;font-weight:400}
.page{display:none}
.page.active{display:block}

/* NAV */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:68px;background:rgba(7,24,41,0.97);border-bottom:1px solid rgba(14,138,130,0.2);backdrop-filter:blur(12px)}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.nav-logo-img{width:36px;height:36px;border-radius:50%;background:white;padding:2px;object-fit:contain}
.nav-logo-name{font-family:'DM Serif Display',serif;font-size:20px;color:white;letter-spacing:0.3px}
.nav-links{display:flex;gap:6px;align-items:center}
.nav-link{color:rgba(255,255,255,0.65);font-size:13px;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;padding:7px 14px;border-radius:6px;transition:all 0.2s}
.nav-link:hover{color:white;background:rgba(255,255,255,0.08)}
.nav-link.active{color:var(--teal-light);background:rgba(14,138,130,0.12)}
.nav-cta{background:var(--teal);color:white;border:none;padding:9px 20px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;margin-left:8px}
.nav-cta:hover{background:var(--teal-light)}

/* BUTTONS */
.btn-primary{background:var(--teal);color:white;border:none;padding:13px 28px;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:var(--teal-light);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.25);padding:13px 28px;border-radius:8px;font-size:15px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.btn-ghost:hover{border-color:var(--teal-light);color:var(--teal-light)}
.btn-outline{background:transparent;color:var(--teal);border:1.5px solid var(--teal);padding:11px 24px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.btn-outline:hover{background:var(--teal);color:white}

/* HERO BASE */
.hero{min-height:88vh;display:flex;align-items:center;background:var(--dark);position:relative;overflow:hidden;padding:90px 5% 70px}
.hero-orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.14;pointer-events:none}
.orb1{width:560px;height:560px;background:var(--teal);top:-120px;right:-100px}
.orb2{width:340px;height:340px;background:#1a3a6e;bottom:-60px;left:3%}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(14,138,130,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(14,138,130,0.05) 1px,transparent 1px);background-size:54px 54px;pointer-events:none}
.hero-inner{position:relative;z-index:2;max-width:1160px;margin:0 auto;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(14,138,130,0.15);border:1px solid rgba(14,138,130,0.3);color:var(--teal-light);padding:6px 14px;border-radius:100px;font-size:11px;font-weight:500;margin-bottom:20px;letter-spacing:0.3px}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--teal-light);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(38px,4.5vw,58px);line-height:1.1;color:white;margin-bottom:18px}
.hero-title .accent{color:var(--teal-light)}
.hero-sub{font-size:16px;line-height:1.75;color:rgba(255,255,255,0.58);font-weight:300;margin-bottom:32px;max-width:470px}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap}
.trust-row{display:flex;gap:20px;margin-top:28px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.38);font-size:11px}
.trust-icon{color:var(--teal);font-size:13px}

/* DEMO CARD */
.demo-card{background:rgba(255,255,255,0.04);border:1px solid rgba(14,138,130,0.25);border-radius:16px;padding:22px;backdrop-filter:blur(8px)}
.card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-label{font-size:10px;font-weight:600;color:rgba(255,255,255,0.5);letter-spacing:1px}
.live-badge{background:rgba(14,138,130,0.2);color:var(--teal-light);padding:3px 10px;border-radius:100px;font-size:10px}
.score-wrap{text-align:center;margin:12px 0 20px}
.score-ring{width:96px;height:96px;border-radius:50%;margin:0 auto 10px;background:conic-gradient(var(--teal) 0deg 252deg,rgba(255,255,255,0.07) 252deg 360deg);display:flex;align-items:center;justify-content:center}
.score-inner{width:72px;height:72px;border-radius:50%;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-family:'DM Serif Display',serif;font-size:26px;color:white;line-height:1}
.score-den{font-size:10px;color:var(--mid-grey)}
.score-lbl{color:var(--teal-light);font-size:11px;font-weight:500}
.signals{display:flex;flex-direction:column;gap:8px}
.signal{display:flex;gap:9px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:10px 12px}
.sig-icon{font-size:14px;margin-top:2px;flex-shrink:0}
.sig-text{color:rgba(255,255,255,0.68);font-size:12px;line-height:1.5}
.sig-bold{color:white;font-weight:500;display:block}
.nudge-box{margin-top:12px;background:rgba(14,138,130,0.1);border:1px solid rgba(14,138,130,0.3);border-radius:10px;padding:12px}
.nudge-lbl{color:var(--teal-light);font-size:9px;font-weight:600;letter-spacing:1.2px;margin-bottom:5px}
.nudge-text{color:rgba(255,255,255,0.78);font-size:12px;line-height:1.55}
.nudge-btns{display:flex;gap:8px;margin-top:9px}
.nb{padding:5px 13px;border-radius:5px;font-size:11px;cursor:pointer;border:none;font-family:'DM Sans';font-weight:500}
.nb-yes{background:var(--teal);color:white}
.nb-no{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.55)}

/* STATS BAR */
.stats-bar{background:var(--navy);padding:52px 5%;border-top:1px solid rgba(14,138,130,0.15);border-bottom:1px solid rgba(14,138,130,0.15)}
.stats-grid{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.stat{text-align:center;padding:16px}
.stat-num{font-family:'DM Serif Display',serif;font-size:40px;color:var(--teal-light);line-height:1;margin-bottom:8px}
.stat-lbl{color:rgba(255,255,255,0.42);font-size:12px;line-height:1.4}

/* SECTIONS */
.section{padding:80px 5%}
.section-inner{max-width:1160px;margin:0 auto}
.sec-tag{color:var(--teal);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.sec-title{font-family:'DM Serif Display',serif;font-size:clamp(28px,3vw,42px);line-height:1.15;margin-bottom:14px;color:var(--navy)}
.sec-sub{color:var(--mid-grey);font-size:15px;line-height:1.75;font-weight:300;max-width:540px}
.sec-title-white{font-family:'DM Serif Display',serif;font-size:clamp(28px,3vw,42px);line-height:1.15;margin-bottom:14px;color:white}

/* HOME CARDS */
.home-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:50px}
.home-card{background:white;border-radius:14px;padding:28px;border:1px solid var(--light-border);cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.home-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--teal);transform:scaleX(0);transition:transform 0.25s;transform-origin:left}
.home-card:hover{border-color:var(--teal);box-shadow:0 8px 32px rgba(14,138,130,0.12);transform:translateY(-3px)}
.home-card:hover::after{transform:scaleX(1)}
.home-card-icon{font-size:32px;margin-bottom:14px}
.home-card-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:10px;color:var(--navy)}
.home-card-text{font-size:13px;color:var(--mid-grey);line-height:1.6;margin-bottom:18px}
.home-card-link{color:var(--teal);font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}

/* FEATURE CARDS */
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:40px}
.feat-card{background:white;border-radius:12px;padding:22px;border:1px solid var(--light-border);transition:all 0.2s}
.feat-card:hover{border-color:var(--teal);box-shadow:0 4px 20px rgba(14,138,130,0.1)}
.feat-icon{width:40px;height:40px;border-radius:10px;background:rgba(14,138,130,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
.feat-title{font-weight:600;font-size:14px;margin-bottom:7px;color:var(--navy)}
.feat-text{font-size:13px;color:var(--mid-grey);line-height:1.6}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.two-col-rev{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}

/* PANEL */
.panel{background:var(--navy);border-radius:14px;padding:28px;color:white}
.panel-title{font-family:'DM Serif Display',serif;font-size:22px;color:white;margin-bottom:5px}
.panel-sub{color:rgba(255,255,255,0.4);font-size:12px;margin-bottom:22px}
.metric{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.07)}
.metric:last-of-type{border-bottom:none}
.metric-lbl{color:rgba(255,255,255,0.52);font-size:13px}
.metric-val{font-family:'DM Serif Display',serif;font-size:22px}
.green{color:#4ade80}.amber{color:#fbbf24}.teal-c{color:var(--teal-light)}
.panel-btn{margin-top:18px;width:100%;padding:12px;background:var(--teal);color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans';transition:background 0.2s}
.panel-btn:hover{background:var(--teal-light)}

/* STEPS */
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:44px}
.step-num{font-family:'DM Serif Display',serif;font-size:52px;color:rgba(14,138,130,0.12);line-height:1;margin-bottom:10px}
.step-icon{font-size:24px;margin-bottom:12px}
.step-title{font-weight:600;font-size:14px;margin-bottom:7px;color:var(--navy)}
.step-text{font-size:12px;color:var(--mid-grey);line-height:1.6}

/* PRIVACY */
.priv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px}
.priv-card{background:white;border-radius:12px;padding:22px;border:1px solid var(--light-border);border-top:3px solid var(--teal)}
.priv-icon{font-size:28px;margin-bottom:13px}
.priv-title{font-weight:600;font-size:14px;margin-bottom:7px;color:var(--navy)}
.priv-text{font-size:12px;color:var(--mid-grey);line-height:1.6}

/* TIMELINE */
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:16px;padding-bottom:22px}
.tl-item:last-child{padding-bottom:0}
.tl-left{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:4px}
.tl-line{flex:1;width:1px;background:rgba(14,138,130,0.25);margin-top:4px}
.tl-week{color:var(--teal-light);font-size:11px;font-weight:600;letter-spacing:0.5px;margin-bottom:4px}
.tl-text{color:rgba(255,255,255,0.62);font-size:13px;line-height:1.55}

/* PILOT SPECS */
.pilot-specs{display:flex;flex-direction:column;gap:13px;margin:24px 0}
.pilot-spec{display:flex;gap:11px;align-items:flex-start}
.spec-icon{color:var(--teal-light);font-size:16px;margin-top:1px;flex-shrink:0}
.spec-text{color:rgba(255,255,255,0.68);font-size:14px;line-height:1.5}

/* CTA SECTION */
.cta-sec{background:var(--navy);padding:80px 5%;text-align:center}
.cta-title{font-family:'DM Serif Display',serif;font-size:clamp(30px,4vw,50px);color:white;margin-bottom:14px}
.cta-title span{color:var(--teal-light)}
.cta-sub{color:rgba(255,255,255,0.45);font-size:16px;margin-bottom:32px;max-width:460px;margin-left:auto;margin-right:auto;font-weight:300}
.cta-form{display:flex;gap:10px;max-width:420px;margin:0 auto;justify-content:center}
.cta-input{flex:1;padding:13px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:white;font-size:14px;font-family:'DM Sans';outline:none;transition:border-color 0.2s}
.cta-input:focus{border-color:var(--teal)}
.cta-input::placeholder{color:rgba(255,255,255,0.28)}
.cta-note{color:rgba(255,255,255,0.22);font-size:11px;margin-top:11px}
.mit-badge{color:rgba(255,255,255,0.32);font-size:11px;margin-top:26px}

/* PILOT CARD */
.pilot-card{background:rgba(255,255,255,0.04);border:1px solid rgba(14,138,130,0.25);border-radius:14px;padding:28px}
.pilot-card-title{font-family:'DM Serif Display',serif;font-size:20px;color:white;margin-bottom:22px}

/* CONTACT FORM */
.contact-form{background:white;border-radius:14px;padding:32px;border:1px solid var(--light-border)}
.form-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);margin-bottom:6px}
.form-sub{color:var(--mid-grey);font-size:13px;margin-bottom:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--navy)}
.form-input{padding:11px 14px;border-radius:7px;border:1px solid var(--light-border);font-size:13px;font-family:'DM Sans';outline:none;color:var(--navy);transition:border-color 0.2s}
.form-input:focus{border-color:var(--teal)}
.form-textarea{padding:11px 14px;border-radius:7px;border:1px solid var(--light-border);font-size:13px;font-family:'DM Sans';outline:none;color:var(--navy);resize:vertical;min-height:90px;transition:border-color 0.2s}
.form-textarea:focus{border-color:var(--teal)}

/* PROVIDER CARDS */
.provider-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:40px}
.provider-card{background:white;border-radius:12px;padding:22px;border:1px solid var(--light-border)}
.provider-card-num{font-family:'DM Serif Display',serif;font-size:38px;color:rgba(14,138,130,0.18);line-height:1;margin-bottom:10px}
.provider-card-title{font-weight:600;font-size:14px;margin-bottom:7px;color:var(--navy)}
.provider-card-text{font-size:12px;color:var(--mid-grey);line-height:1.6}

/* DARK SECTION */
.dark-section{background:var(--dark);padding:80px 5%}
.dark-section .sec-tag{color:var(--teal-light)}

/* PROBLEM CARDS */
.prob-cards{display:flex;flex-direction:column;gap:13px}
.prob-card{border-left:3px solid var(--teal);padding:14px 18px;background:white;border-radius:0 9px 9px 0;border:1px solid var(--light-border);border-left:3px solid var(--teal)}
.prob-card-title{font-weight:600;font-size:14px;color:var(--navy);margin-bottom:5px}
.prob-card-text{font-size:12px;color:var(--mid-grey);line-height:1.55}

/* FOOTER */
.footer{background:var(--dark);padding:32px 5%;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(14,138,130,0.1)}
.footer-logo{display:flex;align-items:center;gap:10px}
.footer-logo-img{width:30px;height:30px;border-radius:50%;background:white;padding:2px;object-fit:contain}
.footer-logo-name{font-family:'DM Serif Display',serif;font-size:18px;color:white}
.footer-tagline{color:rgba(255,255,255,0.22);font-size:11px;font-style:italic;margin-top:3px}
.footer-right{color:rgba(255,255,255,0.22);font-size:11px;text-align:right}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--teal);color:white;padding:11px 24px;border-radius:100px;font-size:13px;z-index:999;transition:transform 0.3s;box-shadow:0 8px 24px rgba(14,138,130,0.4);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* PAGE HERO variants */
.page-hero{background:var(--dark);padding:80px 5% 70px;position:relative;overflow:hidden}
.page-hero-inner{max-width:1160px;margin:0 auto;position:relative;z-index:2}
.page-hero-title{font-family:'DM Serif Display',serif;font-size:clamp(36px,4vw,54px);color:white;line-height:1.12;margin-bottom:16px}
.page-hero-sub{font-size:17px;line-height:1.75;color:rgba(255,255,255,0.55);font-weight:300;max-width:580px;margin-bottom:32px}

/* COMMITMENT BOX */
.commitment-box{background:rgba(14,138,130,0.1);border:1px solid rgba(14,138,130,0.3);border-radius:12px;padding:24px;margin-top:28px}
.commitment-title{color:var(--teal-light);font-size:11px;font-weight:600;letter-spacing:1.5px;margin-bottom:12px}
.commitment-text{color:rgba(255,255,255,0.75);font-size:14px;line-height:1.65}
</style>
</head>

function Nav({ page, setPage }) {
  return (
    <nav className="nav">
      <div className="nav-logo" onClick={() => setPage('home')}>
        <img src={LOGO} className="nav-logo-img" alt="CareSphere"/>
        <span className="nav-logo-name">CareSphere</span>
      </div>
      <div className="nav-links">
        {[['employees','For Employees'],['hr','For HR'],['providers','For Providers'],['pilot','The Pilot']].map(([id,label]) => (
          <button key={id} className={"nav-link"+(page===id?" active":"")} onClick={() => setPage(id)}>{label}</button>
        ))}
        <button className="nav-cta" onClick={() => setPage('pilot')}>Join the pilot →</button>
      </div>
    </nav>
  );
}

function Footer({ setPage }) {
  return (
    <footer className="footer">
      <div>
        <div className="footer-logo">
          <img src={LOGO} className="footer-logo-img" alt="CareSphere"/>
          <span className="footer-logo-name">CareSphere</span>
        </div>
        <div className="footer-tagline">Care that evolves with you</div>
      </div>
      <div className="footer-right">
        MIT Professional Education · CDO Program · Group 3 · 2025<br/>
        © CareSphere · Built with purpose
      </div>
    </footer>
  );
}

function HomePage({ setPage }) {
  return (
    <div>
      <section className="hero">
        <div className="hero-orb orb1"/><div className="hero-orb orb2"/>
        <div className="hero-grid"/>
        <div className="hero-inner">
          <div>
            <div className="hero-badge"><div className="badge-dot"/>MIT CDO Program · Pilot Launching 2025</div>
            <div style={{display:'flex',alignItems:'flex-start',gap:16,marginBottom:18}}>
              <img src={LOGO} style={{height:64,width:'auto',maxWidth:160,background:'white',borderRadius:10,padding:'6px 12px',objectFit:'contain',flexShrink:0,marginTop:4}}/>
              <h1 className="hero-title" style={{marginBottom:0}}>Wellbeing that<br/><span className="accent">works before</span><br/>it breaks down</h1>
            </div>
            <p className="hero-sub">CareSphere is an agentic AI platform that detects burnout risk in calendar patterns weeks before employees feel it — and delivers private, actionable nudges in the flow of work.</p>
            <div className="hero-btns">
              <button className="btn-primary" onClick={() => setPage('pilot')}>Join the pilot →</button>
              <button className="btn-ghost" onClick={() => setPage('employees')}>See how it works</button>
            </div>
            <div className="trust-row">
              {["Privacy-first","No management visibility","Human-in-the-loop","MIT CDO Program"].map(t=>(
                <div key={t} className="trust-item"><span className="trust-icon">✓</span>{t}</div>
              ))}
            </div>

      <CTA setPage={setPage} ctaText="Join the CareSphere marketplace" ctaSub="Register your organization's interest and we will reach out within 48 hours."/>

}

function CTA({ setPage, ctaText="Ready to bring CareSphere to your team?", ctaSub="Whether you are an HR leader, a wellbeing provider, or an employee who wants early access — we would love to hear from you." }) {
  const [email, setEmail] = useState('');
  const [done, setDone] = useState(false);
  const submit = () => { if(email.includes('@')){ setDone(true); } };
  return (
    <section className="cta-sec">
      <div className="sec-tag" style={{color:'var(--teal-light)'}}>Get Involved</div>
      <h2 className="cta-title">{ctaText}</h2>
      <p className="cta-sub">{ctaSub}</p>
      {!done ? (
        <div className="cta-form">
          <input className="cta-input" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
          <button className="btn-primary" onClick={submit}>Register interest</button>
        </div>
      ) : (
        <p style={{color:'var(--teal-light)',fontSize:15,fontWeight:500}}>✓ Thank you — we will be in touch.</p>
      )}
      <p className="cta-note">No spam. No commitment. Just a conversation.</p>
      <div className="mit-badge">🎓 MIT Professional Education · Chief Digital Officer Program · Group 3 · 2025</div>
    </section>
  );
}

function App() {
  const [page, setPage] = useState('home');

  const handleSetPage = (id) => {
    setPage(id);
    window.scrollTo({top:0, behavior:'smooth'});
  };

  const pages = { home:<HomePage setPage={handleSetPage}/>, employees:<EmployeesPage setPage={handleSetPage}/>, hr:<HRPage setPage={handleSetPage}/>, providers:<ProvidersPage setPage={handleSetPage}/>, pilot:<PilotPage/> };

  return (
    <>
      <Nav page={page} setPage={handleSetPage}/>
      {pages[page]}
      <Footer setPage={handleSetPage}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
