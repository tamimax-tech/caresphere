<div id="root"></div>
<script type="text/babel">

  },

      metrics:[{l:"Employees at overload risk",v:"12%",c:"amber"},{l:"Avg focus time this month",v:"↓ 22%",c:"amber"},{l:"After-hours work rate",v:"34%",c:"amber"},{l:"Projected turnover risk",v:"↓ 18%",c:"green"}],

    label:"Wellbeing Providers",

      cta:"Join the marketplace →"}
  }
};

  const [email, setEmail] = useState("");
  const [done, setDone] = useState(false);
  const [toast, setToast] = useState(false);
  const t = stakeholders[tab];

  const submit = () => {
    if(email.includes("@")){
      setDone(true); setToast(true);
      setTimeout(() => setToast(false), 3200);
    }
  };

  return (
    <div className="site">

          <span className="logo-name">CareSphere</span>
        </div>

            <div className="hero-badge"><div className="badge-dot"/>MIT CDO Program · Pilot Launching 2025</div>

          <div className="sec-tag">The Problem</div>

            ))}
          </div>
          <div className="stake-content">
            <div className="features">
              {t.features.map(f => (
                <div key={f.title} className="feat">
                  <div className="feat-icon">{f.icon}</div>
                  <div><div className="feat-title">{f.title}</div><div className="feat-text">{f.text}</div></div>
                </div>
              ))}
            </div>
            <div className="panel">
              <div className="panel-title">{t.panel.title}</div>
              <div className="panel-sub">{t.panel.sub}</div>
              {t.panel.metrics.map(m => (
                <div key={m.l} className="metric"><span className="metric-lbl">{m.l}</span><span className={"metric-val "+m.c}>{m.v}</span></div>
              ))}
              <button className="panel-btn">{t.panel.cta}</button>
            </div>
          </div>
        </div>
      </section>

      <section className="section how-sec">
        <div className="section-inner">
          <div className="sec-tag">How It Works</div>
          <h2 className="sec-title">From signal to action in under 24 hours</h2>
          <div className="steps">
            {[{n:"01",i:"📅",t:"Calendar signal",x:"With your consent, CareSphere reads your work calendar only — meeting load, focus blocks, after-hours patterns. No email, no messages."},{n:"02",i:"🧠",t:"AI detection",x:"The overload engine runs daily, identifying patterns that correlate with burnout risk weeks before employees feel the effects."},{n:"03",i:"💬",t:"Private nudge",x:"A private message is sent to you through Teams or Slack. No HR. No manager. Just you and a concrete suggestion."},{n:"04",i:"📈",t:"Learning loop",x:"Your responses improve the model. Over time, CareSphere becomes more precise to your patterns, baseline, and context."}].map(s => (
              <div key={s.n}><div className="step-num">{s.n}</div><div className="step-icon">{s.i}</div><div className="step-title">{s.t}</div><div className="step-text">{s.x}</div></div>
            ))}
          </div>
        </div>
      </section>

      <section className="pilot-sec">
        <div className="pilot-inner">
          <div>
            <div className="sec-tag" style={{color:"var(--teal-light)"}}>The Pilot</div>
            <h2 className="pilot-title">6 weeks.<br/>15–25 volunteers.<br/>Real results.</h2>
            <p className="pilot-sub">We are running CareSphere's first real-world pilot with a partner organization. No cost, no infrastructure changes, no commitment beyond 6 weeks.</p>
            <div className="pilot-specs">
              {[["📅","6-week pilot duration"],["👥","15–25 volunteer employees (opt-in only)"],["🔒","Read-only calendar API — no email, no messages"],["📊","Anonymized overload report for your organization"],["💰","Zero cost to the sponsor organization"]].map(([i,t]) => (
                <div key={t} className="pilot-spec"><span className="spec-icon">{i}</span><span className="spec-text">{t}</span></div>
              ))}
            </div>
            <button className="btn-primary">Become a pilot partner →</button>
          </div>
          <div className="pilot-card">
            <div className="pilot-card-title">Pilot Timeline</div>
            <div className="timeline">
              {[["Weeks 1–2","Setup, informed consent, IT integration, baseline survey"],["Week 3","Baseline data collection — detection running, no nudges yet"],["Weeks 4–6","Active pilot: nudges live, weekly check-in surveys"],["Week 7","Debrief, analysis, anonymized report delivered to partner"]].map(([w,x],i,a) => (
                <div key={w} className="tl-item">
                  <div className="tl-left"><div className="tl-dot"/>{i<a.length-1&&<div className="tl-line"/>}</div>
                  <div><div className="tl-week">{w}</div><div className="tl-text">{x}</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      <section className="section priv-sec">
        <div className="section-inner">
          <div className="sec-tag">Privacy & Trust</div>
          <h2 className="sec-title">Wellbeing data deserves the highest standard</h2>
          <p className="sec-sub">Every architectural decision was made with employee trust as the primary constraint.</p>
          <div className="priv-grid">
            {[{i:"🔐",t:"Data never shared",x:"No individual data is ever accessible to management, HR, or your employer. Only you see your private report."},{i:"✍️",t:"Informed consent",x:"Every participant signs consent before any data is collected. Withdrawal is possible at any time."},{i:"🗄️",t:"Encrypted & deleted",x:"Calendar data is encrypted, accessible only to the project team, and deleted after the pilot ends."},{i:"👁️",t:"Read-only access only",x:"CareSphere reads calendar metadata only. No email content, no messages, no screen activity. Ever."},{i:"🏛️",t:"MIT ethics review",x:"The pilot is submitted for MIT research ethics review before any data collection begins."},{i:"🌍",t:"GDPR & PDPL compliant",x:"Designed for EU GDPR and UAE PDPL compliance from the ground up."}].map(c => (
              <div key={c.t} className="priv-card"><div className="priv-icon">{c.i}</div><div className="priv-title">{c.t}</div><div className="priv-text">{c.x}</div></div>
            ))}
          </div>
        </div>
      </section>

      <section className="cta-sec">
        <div className="sec-tag" style={{color:"var(--teal-light)"}}>Get Involved</div>
        <h2 className="cta-title">Ready to bring <span>CareSphere</span> to your team?</h2>
        <p className="cta-sub">Whether you are an HR leader, a wellbeing provider, or an employee who wants early access — we would love to hear from you.</p>
        {!done ? (
          <div className="cta-form">
            <input className="cta-input" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
            <button className="btn-primary" onClick={submit}>Register interest</button>
          </div>
        ) : (
          <p style={{color:"var(--teal-light)",fontSize:15,fontWeight:500}}>✓ Thank you — we will be in touch.</p>
        )}
        <p className="cta-note">No spam. No commitment. Just a conversation.</p>
        <div className="mit-badge">🎓 MIT Professional Education · Chief Digital Officer Program · Group 3 · 2025</div>
      </section>

      <footer className="footer">
        <div className="logo"><div className="logo-mark" style={{width:28,height:28,fontSize:12}}>CS</div><span className="logo-name">CareSphere</span></div>
        <div className="footer-r">© 2025 CareSphere · MIT CDO Program · Group 3 · Built with purpose</div>
      </footer>

      <div className={"toast"+(toast?" show":"")} >✓ You are on the list — we will be in touch!</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
